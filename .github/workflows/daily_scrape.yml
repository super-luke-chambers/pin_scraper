name: Daily Pinnacle Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python pinnacle_scrape_odds_1_web.py

      - name: Write Excel file
        run: python pinnacle_write_data_2_new_web.py

      - name: Run corner model
        run: python run_corner_model.py

      - name: Move outputs to folder
        run: |
          mkdir -p outputs
          mv PinnacleOddsDatabase.db outputs/ 2>/dev/null || true
          mv pinnacle_odds_data.xlsx outputs/ 2>/dev/null || true
          mv pinnacle_corners_historical.xlsx outputs/ 2>/dev/null || true

      - name: Post corners outputs to Slack
        continue-on-error: true
        run: |
          pip install slack_sdk
          python - <<'PY'
          import os
          import re
          import glob
          from datetime import timezone, datetime
          from slack_sdk import WebClient

          client = WebClient(token=os.environ["SLACK_BOT_TOKEN"])
          channel = os.environ["SLACK_CHANNEL_ID"]

          # Pick the most recent dated current file (pinnacle_corners_ddmmyyyy.xlsx)
          def sort_key(path):
              m = re.search(r"pinnacle_corners_(\d{2})(\d{2})(\d{4})\.xlsx$", path)
              if not m:
                  return ""
              dd, mm, yyyy = m.groups()
              return yyyy + mm + dd  # yyyymmdd, lexically sortable
          current_files = glob.glob("outputs/pinnacle_corners_current/pinnacle_corners_*.xlsx")
          latest_current = max(current_files, key=sort_key) if current_files else None

          files = []
          if latest_current:
              files.append(latest_current)

          uploads = [{"file": f, "title": os.path.basename(f)} for f in files]
          if not uploads:
              raise SystemExit("No corners output files found to upload")
          today = datetime.now(timezone.utc).date().isoformat()
          client.files_upload_v2(
              channel=channel,
              file_uploads=uploads,
              initial_comment=f":soccer: Pinnacle corners outputs — {today}",
          )
          print(f"Uploaded {len(uploads)} file(s) to Slack channel {channel}")
          PY
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --staged --quiet || git commit -m "Daily scrape output - $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
