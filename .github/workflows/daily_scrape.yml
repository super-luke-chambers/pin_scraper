name: Daily Pinnacle Scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python pinnacle_scrape_odds_1_web.py

      - name: Write Excel file
        run: python pinnacle_write_data_2_new_web.py

      - name: Run corner model
        run: python run_corner_model.py

      - name: Move outputs to folder
        run: |
          mkdir -p outputs
          mv PinnacleOddsDatabase.db outputs/ 2>/dev/null || true
          mv pinnacle_odds_data.xlsx outputs/ 2>/dev/null || true
          mv pinnacle_corners_current.xlsx outputs/ 2>/dev/null || true
          mv pinnacle_corners_historical.xlsx outputs/ 2>/dev/null || true

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --staged --quiet || git commit -m "Daily scrape output - $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
